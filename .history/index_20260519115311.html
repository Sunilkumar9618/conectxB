<body>
    <!-- Initialize theme and clear old data -->
    <script>
        (function() {
            try {
                console.log('🧹 Checking for old data...');
                
                // Clear old localStorage keys from previous system
                const oldKeys = [
                    'jsbeacons_session',
                    'jsbeacons_theme',
                    'beacons_users',
                    'beacons_blocks',
                    'beacons_products',
                    'beacons_analytics',
                    'beacons_theme'
                ];
                
                let foundOldData = false;
                oldKeys.forEach(key => {
                    if (localStorage.getItem(key)) {
                        console.log('Found old key:', key);
                        foundOldData = true;
                    }
                });
                
                if (foundOldData) {
                    console.log('🗑️ Clearing old localStorage and sessionStorage...');
                    localStorage.clear();
                    sessionStorage.clear();
                    console.log('✅ Cleared');
                }
                
                // Load new theme preference
                const theme = localStorage.getItem('conectxb_theme');
                if (theme) {
                    const themeObj = JSON.parse(theme);
                    if (themeObj.mode === 'light') {
                        document.documentElement.setAttribute('data-theme', 'light');
                    }
                }
            } catch(e) {
                console.error('Theme init error:', e);
            }
        })();
    </script>
    
    <!-- Root container -->
    <div id="app">
        <!-- Loader for initial state -->
        <div id="loading-screen" class="loading-screen">
            <div class="spinner"></div>
        </div>
