    <!-- Initialize theme immediately to prevent flash -->
    <script>
        (function() {
            try {
                const theme = localStorage.getItem('jsbeacons_theme');
                if (theme) {
                    const themeObj = JSON.parse(theme);
                    if (themeObj.mode === 'light') {
                        document.documentElement.setAttribute('data-theme', 'light');
                    }
                }
            } catch(e) {
                console.log('Theme init error:', e);
            }
